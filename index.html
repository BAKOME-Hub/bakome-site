<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1120">
<meta name="description" content="BAKOME-Hub - Open Source Colossus">
<link rel="manifest" href="manifest.json">
<title>BAKOME-Hub · Colossus</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b1120;--surface:#111827;--card:rgba(30,41,59,0.7);--text:#e2e8f0;--primary:#3b82f6;--accent:#06b6d4;--gold:#f59e0b;--radius:24px;--transition:all 0.35s ease}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.navbar{position:sticky;top:0;z-index:1000;display:flex;justify-content:space-between;align-items:center;padding:1rem;background:rgba(11,17,32,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);flex-wrap:wrap;gap:0.3rem}
.logo{font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:0.3rem;flex-wrap:wrap;max-height:200px;overflow-y:auto}
.nav-links a{color:var(--text);text-decoration:none;font-weight:500;font-size:0.7rem;padding:0.3rem 0.5rem;border-radius:15px;transition:var(--transition);white-space:nowrap}
.nav-links a:hover,.nav-links a.active{background:var(--primary);color:#fff}
.container{max-width:1400px;margin:0 auto;padding:1.5rem 1rem;position:relative;z-index:1}
.section{display:none;margin:2rem 0}
.section.active{display:block}
h2{font-size:1.6rem;margin-bottom:1rem;border-left:5px solid var(--primary);padding-left:1rem}
.card{background:var(--card);backdrop-filter:blur(10px);border-radius:var(--radius);padding:1.2rem;border:1px solid rgba(255,255,255,0.06);transition:var(--transition)}
.card:hover{transform:translateY(-3px);box-shadow:0 20px 40px rgba(0,0,0,0.4)}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.8rem}
.btn{display:inline-block;padding:0.6rem 1.2rem;border-radius:60px;font-weight:700;text-decoration:none;margin:0.2rem;transition:var(--transition);cursor:pointer;border:none;font-size:0.9rem}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{transform:translateY(-2px)}
.btn-outline{border:2px solid var(--accent);color:var(--accent);background:transparent}
#terminal-box{background:#000;color:#0f0;font-family:monospace;padding:1rem;border-radius:12px;height:250px;overflow-y:auto}
#terminal-box input{background:transparent;border:none;color:#0f0;font-family:monospace;font-size:0.9rem;width:100%;outline:none}
#globe-container{width:100%;height:300px;border-radius:20px;overflow:hidden;background:#000}
.address{word-break:break-all;font-family:monospace;font-size:0.75rem;background:rgba(0,0,0,0.3);padding:0.4rem;border-radius:8px;margin:0.2rem 0}
.copy-btn{cursor:pointer;color:var(--accent);font-size:0.75rem}
.donation-bar{height:8px;background:rgba(255,255,255,0.1);border-radius:8px;margin:0.4rem 0;overflow:hidden}
.donation-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:8px;transition:width 1s ease;width:0%}
#chat-messages{height:250px;overflow-y:auto;margin-bottom:0.5rem;padding:0.5rem;background:rgba(0,0,0,0.2);border-radius:12px}
#chat-messages div{margin:0.3rem 0;padding:0.4rem 0.8rem;border-radius:15px;max-width:80%}
.user-msg{background:var(--primary);color:#fff;margin-left:auto;text-align:right}
.bot-msg{background:var(--surface);margin-right:auto}
.roadmap-step{display:flex;align-items:center;gap:1rem;padding:0.8rem;border-left:3px solid var(--primary);margin:0.5rem 0}
.roadmap-step.done{border-left-color:#22c55e}
.roadmap-step.progress{border-left-color:var(--gold)}
.trust-logo{text-align:center;padding:0.5rem;font-size:1.5rem;opacity:0.5;transition:var(--transition)}
.trust-logo:hover{opacity:1;transform:scale(1.1)}
footer{text-align:center;padding:1.5rem;background:var(--surface);border-top:1px solid rgba(255,255,255,0.05);position:relative;z-index:1;margin-top:2rem;font-size:0.8rem}
@media(max-width:768px){.nav-links a{font-size:0.65rem;padding:0.2rem 0.4rem}}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<nav class="navbar">
<div class="logo">🏰 BAKOME-Hub</div>
<div class="nav-links" id="nav-links"></div>
</nav>

<div class="container" id="main-content"></div>

<footer><p>© 2026 BAKOME-Hub · MIT · Built with passion</p></footer>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const SECTIONS = [
  {id:'home',icon:'🏠',label:'Home'},
  {id:'chat',icon:'💬',label:'Chat AI'},
  {id:'terminal',icon:'💻',label:'Terminal'},
  {id:'bots',icon:'🤖',label:'Bots'},
  {id:'research',icon:'🔬',label:'Research'},
  {id:'globe',icon:'🌍',label:'Globe'},
  {id:'video',icon:'🎥',label:'Video'},
  {id:'blog',icon:'📝',label:'Blog'},
  {id:'roadmap',icon:'🗺️',label:'Roadmap'},
  {id:'sandbox',icon:'🧪',label:'Sandbox'},
  {id:'faq',icon:'❓',label:'FAQ'},
  {id:'press',icon:'📰',label:'Press'},
  {id:'trust',icon:'⭐',label:'Trust'},
  {id:'donate',icon:'💰',label:'Donate'},
  {id:'brokers',icon:'📈',label:'Brokers'},
  {id:'testimonials',icon:'🗣️',label:'Reviews'},
  {id:'leaderboard',icon:'🏆',label:'Top'},
  {id:'api',icon:'🔌',label:'API'},
  {id:'podcast',icon:'🎙️',label:'Podcast'},
  {id:'badge',icon:'🏅',label:'Badge'},
  {id:'contact',icon:'📞',label:'Contact'}
];

// Build navbar
document.getElementById('nav-links').innerHTML = SECTIONS.map(s =>
  `<a href="#${s.id}" onclick="showSection('${s.id}')">${s.icon} ${s.label}</a>`
).join('');

// Build sections
document.getElementById('main-content').innerHTML = SECTIONS.map(s =>
  `<div id="${s.id}" class="section${s.id==='home'?' active':''}"></div>`
).join('');

// ============================================================
// SECTION SWITCHER
// ============================================================
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
  const link = document.querySelector(`.nav-links a[href="#${id}"]`);
  if(link) link.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  initSection(id);
}

// ============================================================
// SECTION INITIALIZERS
// ============================================================
function initSection(id){
  switch(id){
    case 'home': initHome(); break;
    case 'chat': initChat(); break;
    case 'terminal': initTerminal(); break;
    case 'bots': initBots(); break;
    case 'research': initResearch(); break;
    case 'globe': initGlobe(); break;
    case 'video': initVideo(); break;
    case 'blog': initBlog(); break;
    case 'roadmap': initRoadmap(); break;
    case 'sandbox': initSandbox(); break;
    case 'faq': initFAQ(); break;
    case 'press': initPress(); break;
    case 'trust': initTrust(); break;
    case 'donate': initDonate(); break;
    case 'brokers': initBrokers(); break;
    case 'testimonials': initTestimonials(); break;
    case 'leaderboard': initLeaderboard(); break;
    case 'api': initAPI(); break;
    case 'podcast': initPodcast(); break;
    case 'badge': initBadge(); break;
    case 'contact': initContact(); break;
  }
}

// ============================================================
// PARTICLES (global)
// ============================================================
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
let particles=[];
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
class Particle{constructor(){this.reset()}
reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*2+0.5;this.speedX=Math.random()*0.3-0.15;this.speedY=Math.random()*0.3-0.15;this.opacity=Math.random()*0.5+0.1}
update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x<0||this.x>canvas.width)this.speedX*=-1;if(this.y<0||this.y>canvas.height)this.speedY*=-1}
draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=`rgba(59,130,246,${this.opacity})`;ctx.fill()}}
for(let i=0;i<60;i++)particles.push(new Particle());
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}animate();

// ============================================================
// 1. HOME
// ============================================================
function initHome(){
  document.getElementById('home').innerHTML=`
    <div style="text-align:center;padding:2rem 0">
      <h1 style="font-size:clamp(1.8rem,4vw,3rem);font-weight:900">🏰 <span style="background:linear-gradient(135deg,var(--primary),var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent">BAKOME-Hub</span></h1>
      <p style="font-size:1rem;max-width:500px;margin:1rem auto">150+ commands · 3 platforms · AI · Trading · Web3 · Rust · MIT</p>
      <div class="grid4">
        <div class="card" style="text-align:center"><h3>🤖</h3><p>3 Bots</p></div>
        <div class="card" style="text-align:center"><h3>💻</h3><p>150+ Cmd</p></div>
        <div class="card" style="text-align:center"><h3>🌍</h3><p>15 Langues</p></div>
        <div class="card" style="text-align:center"><h3>🦀</h3><p>4000+ Lignes</p></div>
      </div>
      <div style="margin-top:1rem">
        <a href="#chat" class="btn btn-primary" onclick="showSection('chat')">💬 Chat AI</a>
        <a href="#terminal" class="btn btn-primary" onclick="showSection('terminal')">💻 Terminal</a>
        <a href="#donate" class="btn btn-outline" onclick="showSection('donate')">💰 Donate</a>
      </div>
    </div>`;
}

// ============================================================
// 2. CHAT AI (DeepSeek compatible)
// ============================================================
function initChat(){
  document.getElementById('chat').innerHTML=`
    <h2>💬 Chat with BAKOME AI</h2>
    <div class="card">
      <div id="chat-messages"><div class="bot-msg">🤖 Hello! I'm BAKOME AI. Ask me anything about our open source projects, crypto, or how to contribute.</div></div>
      <div style="display:flex;gap:0.5rem">
        <input type="text" id="chat-input" placeholder="Ask me anything..." style="flex:1;padding:0.6rem;border-radius:20px;border:1px solid #334155;background:var(--surface);color:var(--text)">
        <button class="btn btn-primary" onclick="sendChat()">Send</button>
      </div>
    </div>`;
}

function sendChat(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();
  if(!msg) return;
  const container=document.getElementById('chat-messages');
  container.innerHTML+=`<div class="user-msg">${msg}</div>`;
  input.value='';
  setTimeout(()=>{
    let reply='';
    const l=msg.toLowerCase();
    if(l.includes('donate')||l.includes('crypto')) reply='You can donate via BTC, ETH, SOL, USDT. Check the Donate section for addresses. 💖';
    else if(l.includes('bot')||l.includes('mega')) reply='BAKOME_MEGA-BOT v8.0 runs on Telegram, Discord, and Matrix with 150+ commands. Pure Rust, 4000+ lines, MIT license. 🚀';
    else if(l.includes('nexus')||l.includes('vault')) reply='BAKOME-NEXUS v2.0 is an institutional vault with ZK-Proofs, FHE, and TEE. 12 blockchains supported. 🔐';
    else if(l.includes('rust')) reply='All our projects are built in pure Rust for maximum performance and safety. Check our GitHub for 25+ repositories. 🦀';
    else if(l.includes('help')||l.includes('command')) reply='Type /help in the Terminal to see all 150+ commands. Or check the Bots section. 💻';
    else reply='Great question! Check our GitHub (BAKOME-Hub) for all projects, or visit the Terminal to test commands. Is there anything specific you\'d like to know? 🤖';
    container.innerHTML+=`<div class="bot-msg">🤖 ${reply}</div>`;
    container.scrollTop=container.scrollHeight;
  },500);
}

// ============================================================
// 3. TERMINAL
// ============================================================
function initTerminal(){
  document.getElementById('terminal').innerHTML=`
    <h2>💻 Live Terminal</h2>
    <div class="card" id="terminal-box"><div id="terminal-output">$ BAKOME_MEGA-BOT v8.0 — Type /help
</div><input type="text" id="terminal-input" placeholder="/help, /crypto BTC, /yield, /status..."></div>`;
  const tInput=document.getElementById('terminal-input'),tOutput=document.getElementById('terminal-output');
  tInput.addEventListener('keydown',function(e){if(e.key==='Enter'){let cmd=this.value.trim();tOutput.innerHTML+=`\n$ ${cmd}`;let r='';
  if(cmd==='/help')r='Commands: /crypto [sym] /gold /forex [pair] /yield /status /donate /bridge /zk /help';
  else if(cmd.startsWith('/crypto')){let s=cmd.split(' ')[1]||'BTC';r=`💰 ${s.toUpperCase()} = $${(Math.random()*100000).toFixed(2)} USDT`}
  else if(cmd==='/gold')r='🪙 XAU/USD = $2,340.50';
  else if(cmd==='/yield')r='🌾 Top Yields:\n1. solana:Jito - 45.4%\n2. polygon:Curve - 48.6%\n3. starknet:MySwap - 45.8%';
  else if(cmd==='/status')r='✅ BAKOME_MEGA-BOT v8.0 Online | 3 Platforms | 150+ Cmd';
  else if(cmd==='/donate')r='BTC: bc1qhtjp3qpqru4vuqd355dfcn46mqjrlpdfmngk6u0';
  else r=`❓ ${cmd}: not found. Type /help`;
  tOutput.innerHTML+=`\n${r}\n`;this.value='';tOutput.scrollTop=tOutput.scrollHeight}});
}

// ============================================================
// 4. BOTS
// ============================================================
function initBots(){
  document.getElementById('bots').innerHTML=`
    <h2>🤖 Our Bots</h2>
    <div class="grid3">${[
      {name:'BAKOME_MEGA-BOT',ver:'v8.0',desc:'Telegram+Discord+Matrix · 150+ commands',url:'https://github.com/BAKOME-Hub/BAKOME_MEGA-BOT'},
      {name:'BAKOME-NEXUS',ver:'v2.0',desc:'Institutional vault · ZK·FHE·TEE',url:'https://github.com/BAKOME-Hub/BAKOME-NEXUS'},
      {name:'Viber Bot',ver:'v5.0',desc:'90+ commands · Trading·AI',url:'https://github.com/BAKOME-Hub/BAKOME-Viber-Bot'},
      {name:'Scholar',ver:'v5.0',desc:'Scientific search · 15 sources',url:'https://github.com/BAKOME-Hub/BAKOME-Scholar'},
      {name:'Vault',ver:'v2.0',desc:'Multi-chain vault · AI Yield',url:'https://github.com/BAKOME-Hub/BAKOME-Vault'},
      {name:'All 25+',ver:'',desc:'View all on GitHub',url:'https://github.com/BAKOME-Hub'}
    ].map(b=>`<div class="card"><span style="color:var(--primary)">${b.ver}</span><h3>${b.name}</h3><p>${b.desc}</p><a href="${b.url}" target="_blank" style="color:var(--accent)">GitHub →</a></div>`).join('')}</div>`;
}

// ============================================================
// 5. RESEARCH
// ============================================================
function initResearch(){
  document.getElementById('research').innerHTML=`
    <h2>🔬 Academic Research</h2>
    <div style="display:flex;gap:0.5rem;margin-bottom:1rem">
      <input type="text" id="research-input" placeholder="Search arXiv, Wikipedia..." style="flex:1;padding:0.6rem;border-radius:20px;border:1px solid #334155;background:var(--surface);color:var(--text)">
      <button class="btn btn-primary" onclick="searchAcademic()">🔍</button>
    </div>
    <div id="research-results" class="grid2"></div>`;
}

async function searchAcademic(){
  const q=document.getElementById('research-input').value;
  if(!q) return;
  document.getElementById('research-results').innerHTML='<div class="card"><p>🔍 Searching...</p></div>';
  let r='';
  try{let arxiv=await fetch(`https://export.arxiv.org/api/query?search_query=all:${encodeURIComponent(q)}&max_results=2`).then(r=>r.text());
  let titles=arxiv.match(/<title>(.*?)<\/title>/g)?.slice(1,3).map(t=>t.replace(/<\/?title>/g,''))||[];
  r+='<div class="card"><h3>📄 arXiv</h3>'+titles.map(t=>`<p>• ${t}</p>`).join('')+'</div>';}catch(e){}
  try{let wiki=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`).then(r=>r.json());
  if(wiki.extract)r+=`<div class="card"><h3>📚 Wikipedia</h3><p>${wiki.extract.substring(0,200)}...</p></div>`;}catch(e){}
  document.getElementById('research-results').innerHTML=r||'<div class="card"><p>No results.</p></div>';
}

// ============================================================
// 6. GLOBE 3D
// ============================================================
function initGlobe(){
  document.getElementById('globe').innerHTML=`<h2>🌍 Users Worldwide</h2><div id="globe-container"></div>`;
  setTimeout(()=>{
    const container=document.getElementById('globe-container');
    if(!container) return;
    const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(45,container.clientWidth/300,0.1,1000);
    const renderer=new THREE.WebGLRenderer({alpha:true});
    renderer.setSize(container.clientWidth,300);
    container.appendChild(renderer.domElement);
    const geometry=new THREE.SphereGeometry(5,32,32);
    const material=new THREE.MeshBasicMaterial({color:0x1e293b,wireframe:true,transparent:true,opacity:0.3});
    const globe=new THREE.Mesh(geometry,material);scene.add(globe);
    for(let i=0;i<40;i++){let dot=new THREE.Mesh(new THREE.SphereGeometry(0.04,4,4),new THREE.MeshBasicMaterial({color:0x3b82f6}));
    dot.position.set((Math.random()-0.5)*12,(Math.random()-0.5)*12,(Math.random()-0.5)*12);globe.add(dot);}
    camera.position.z=15;
    (function anim(){requestAnimationFrame(anim);globe.rotation.y+=0.003;renderer.render(scene,camera)})();
  },300);
}

// ============================================================
function initVideo(){
  document.getElementById('video').innerHTML=`
    <h2>🎥 AI Video Generator</h2>
    <div class="card">
      <input type="text" id="video-prompt" placeholder="Describe your video..." style="width:100%;padding:0.6rem;border-radius:20px;border:1px solid #334155;background:var(--surface);color:var(--text);margin-bottom:0.5rem">

    <p style="margin-top:0.3rem"><a href="https://video.pollinations.ai/prompt/${encodeURIComponent(prompt)}" target="_blank" style="color:var(--accent)">Download</a></p>`;

// ============================================================
// 10. SANDBOX
// ============================================================
function initSandbox(){
  document.getElementById('sandbox').innerHTML=`
    <h2>🧪 Code Sandbox</h2>
    <div class="card">
      <textarea id="sandbox-code" placeholder="// Write Rust code here...\nfn main() {\n    println!(\"Hello, BAKOME!\");\n}" style="width:100%;height:150px;background:#000;color:#0f0;font-family:monospace;padding:1rem;border-radius:12px;border:1px solid #334155"></textarea>
      <button class="btn btn-primary" style="margin-top:0.5rem" onclick="runSandbox()">▶️ Run (simulated)</button>

function runSandbox(){
  const code=document.getElementById('sandbox-code').value;
  document.getElementById('sandbox-output').textContent=`$ cargo run\nCompiling...\nRunning...\n> ${code.includes('println')?'Hello, BAKOME!':'Output: (simulated)'}\n✓ Done`;
}

// ============================================================
// 11. FAQ
// ============================================================
function initFAQ(){
  document.getElementById('faq').innerHTML=`
    <h2>❓ FAQ</h2>
    <div class="grid2">${[
