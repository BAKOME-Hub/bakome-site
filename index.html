<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1120">
<meta name="description" content="BAKOME-Hub - Open Source Colossus">
<title>BAKOME-Hub · Colossus</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b1120;--surface:#111827;--card:rgba(30,41,59,0.7);--text:#e2e8f0;--primary:#3b82f6;--accent:#06b6d4;--gold:#f59e0b;--radius:20px}
[data-theme="light"]{--bg:#f8fafc;--surface:#fff;--card:rgba(255,255,255,0.9);--text:#0f172a}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;transition:background 0.3s,color 0.3s}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.navbar{position:sticky;top:0;z-index:1000;display:flex;justify-content:space-between;align-items:center;padding:0.8rem 1rem;background:rgba(11,17,32,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);flex-wrap:wrap;gap:0.3rem}
[data-theme="light"] .navbar{background:rgba(255,255,255,0.9)}
.logo{font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:0.2rem;flex-wrap:wrap;max-height:180px;overflow-y:auto}
.nav-links a{color:var(--text);text-decoration:none;font-weight:500;font-size:0.65rem;padding:0.25rem 0.4rem;border-radius:12px;white-space:nowrap}
.nav-links a:hover,.nav-links a.active{background:var(--primary);color:#fff}
.container{max-width:1400px;margin:0 auto;padding:1rem;position:relative;z-index:1}
.section{display:none;margin:1.5rem 0}
.section.active{display:block}
h2{font-size:1.4rem;margin-bottom:1rem;border-left:4px solid var(--primary);padding-left:0.8rem}
.card{background:var(--card);backdrop-filter:blur(10px);border-radius:var(--radius);padding:1rem;border:1px solid rgba(255,255,255,0.06);transition:all 0.3s}
.card:hover{transform:translateY(-2px);box-shadow:0 15px 30px rgba(0,0,0,0.3)}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:0.8rem}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0.8rem}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:0.6rem}
.btn{display:inline-block;padding:0.5rem 1rem;border-radius:50px;font-weight:700;text-decoration:none;margin:0.2rem;cursor:pointer;border:none;font-size:0.8rem;transition:all 0.3s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{transform:translateY(-1px)}
.btn-outline{border:2px solid var(--accent);color:var(--accent);background:transparent}
#terminal-box{background:#000;color:#0f0;font-family:monospace;padding:0.8rem;border-radius:12px;height:220px;overflow-y:auto;font-size:0.8rem}
#terminal-box input{background:transparent;border:none;color:#0f0;font-family:monospace;font-size:0.8rem;width:100%;outline:none}
#globe-container{width:100%;height:280px;border-radius:16px;overflow:hidden;background:#000}
.address{word-break:break-all;font-family:monospace;font-size:0.7rem;background:rgba(0,0,0,0.3);padding:0.3rem;border-radius:6px;margin:0.2rem 0}
.live-feed{max-height:300px;overflow-y:auto}
.live-feed-item{padding:0.5rem;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.8rem}
.theme-toggle{position:fixed;bottom:80px;right:20px;z-index:9999;background:var(--surface);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 20px rgba(0,0,0,0.3);font-size:1.2rem}
.notification{position:fixed;top:20px;right:20px;z-index:10000;background:var(--primary);color:#fff;padding:0.8rem 1.2rem;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.3);animation:slideIn 0.3s ease;display:none}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
footer{text-align:center;padding:1.5rem;background:var(--surface);border-top:1px solid rgba(255,255,255,0.05);position:relative;z-index:1;margin-top:2rem;font-size:0.75rem}
@media(min-width:768px){.nav-links a{font-size:0.75rem;padding:0.3rem 0.6rem}}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="notification" id="notification"></div>
<div class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</div>

<nav class="navbar">
<div class="logo">🏰 BAKOME-Hub</div>
<div class="nav-links" id="nav-links"></div>
</nav>

<div class="container" id="main-content"></div>

<footer><p>© 2026 BAKOME-Hub · MIT · Built with passion · <span id="lang-switcher"></span></p></footer>

<script>
// ============================================================
// MULTI-LANGUES
// ============================================================
const LANGUAGES = ['en','fr','es','de','zh','ja','ru','ar','hi','pt','it','ko','tr','nl','pl'];
let currentLang = navigator.language.split('-')[0] || 'en';
if(!LANGUAGES.includes(currentLang)) currentLang = 'en';

const translations = {
  donate: {en:'Donate',fr:'Faire un don',es:'Donar',de:'Spenden',zh:'捐款',ja:'寄付',ru:'Пожертвовать',ar:'تبرع',hi:'दान',pt:'Doar',it:'Donare',ko:'기부',tr:'Bağış',nl:'Doneren',pl:'Darowizna'},
  bots: {en:'Bots',fr:'Robots',es:'Bots',de:'Bots',zh:'机器人',ja:'ボット',ru:'Боты',ar:'بوتات',hi:'बॉट',pt:'Bots',it:'Bot',ko:'봇',tr:'Botlar',nl:'Bots',pl:'Boty'},
  contact: {en:'Contact',fr:'Contact',es:'Contacto',de:'Kontakt',zh:'联系',ja:'連絡',ru:'Контакты',ar:'اتصال',hi:'संपर्क',pt:'Contato',it:'Contatto',ko:'연락처',tr:'İletişim',nl:'Contact',pl:'Kontakt'},
  home: {en:'Home',fr:'Accueil',es:'Inicio',de:'Start',zh:'首页',ja:'ホーム',ru:'Главная',ar:'الرئيسية',hi:'होम',pt:'Início',it:'Home',ko:'홈',tr:'Ana Sayfa',nl:'Home',pl:'Strona główna'}
};

function t(key){return (translations[key]||{})[currentLang]||key}

// ============================================================
// SECTIONS
// ============================================================
const SECTIONS = [
  {id:'home',icon:'🏠',label:t('home')},
  {id:'chat',icon:'💬',label:'Chat AI'},
  {id:'terminal',icon:'💻',label:'Terminal'},
  {id:'bots',icon:'🤖',label:t('bots')},
  {id:'research',icon:'🔬',label:'Research'},
  {id:'globe',icon:'🌍',label:'Globe'},
  {id:'video',icon:'🎥',label:'Video'},
  {id:'blog',icon:'📝',label:'Blog'},
  {id:'grants',icon:'💰',label:'Grants'},
  {id:'giants',icon:'🏢',label:'Giants'},
  {id:'roadmap',icon:'🗺️',label:'Roadmap'},
  {id:'sandbox',icon:'🧪',label:'Sandbox'},
  {id:'faq',icon:'❓',label:'FAQ'},
  {id:'docs',icon:'📖',label:'Docs'},
  {id:'donate',icon:'💖',label:t('donate')},
  {id:'brokers',icon:'📈',label:'Brokers'},
  {id:'contact',icon:'📞',label:t('contact')}
];

document.getElementById('nav-links').innerHTML = SECTIONS.map(s => `<a href="#${s.id}" onclick="showSection('${s.id}')">${s.icon} ${s.label}</a>`).join('');
document.getElementById('main-content').innerHTML = SECTIONS.map(s => `<div id="${s.id}" class="section${s.id==='home'?' active':''}"></div>`).join('');

// Theme
function toggleTheme(){
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  html.setAttribute('data-theme', current==='dark'?'light':'dark');
  document.getElementById('theme-btn').textContent = current==='dark'?'🌙':'☀️';
  localStorage.setItem('theme', current==='dark'?'light':'dark');
}
const savedTheme = localStorage.getItem('theme')||'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('theme-btn').textContent = savedTheme==='dark'?'🌙':'☀️';

// Section switcher
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
  const link = document.querySelector(`.nav-links a[href="#${id}"]`);
  if(link) link.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  initSection(id);
}

// Notification
function notify(msg){const n=document.getElementById('notification');n.textContent=msg;n.style.display='block';setTimeout(()=>n.style.display='none',4000);}

// Particles
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
let particles=[];
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
class Particle{constructor(){this.reset()}reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*2+0.5;this.speedX=Math.random()*0.3-0.15;this.speedY=Math.random()*0.3-0.15;this.opacity=Math.random()*0.5+0.1}update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x<0||this.x>canvas.width)this.speedX*=-1;if(this.y<0||this.y>canvas.height)this.speedY*=-1}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=`rgba(59,130,246,${this.opacity})`;ctx.fill()}}
for(let i=0;i<50;i++)particles.push(new Particle());
function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(anim)}anim();

// ============================================================
// INIT SECTIONS
// ============================================================
function initSection(id){
  switch(id){
    case 'home': initHome(); break;
    case 'chat': initChat(); break;
    case 'terminal': initTerminal(); break;
    case 'bots': initBots(); break;
    case 'research': initResearch(); break;
    case 'globe': initGlobe(); break;
    case 'video': initVideo(); break;
    case 'blog': initBlog(); break;
    case 'grants': initGrants(); break;
    case 'giants': initGiants(); break;
    case 'roadmap': initRoadmap(); break;
    case 'sandbox': initSandbox(); break;
    case 'faq': initFAQ(); break;
    case 'docs': initDocs(); break;
    case 'donate': initDonate(); break;
    case 'brokers': initBrokers(); break;
    case 'contact': initContact(); break;
  }
}

function initHome(){
  document.getElementById('home').innerHTML = `<div style="text-align:center;padding:2rem 0">
    <h1 style="font-size:clamp(1.8rem,4vw,3rem);font-weight:900">🏰 <span style="background:linear-gradient(135deg,var(--primary),var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent">BAKOME-Hub</span></h1>
    <p style="font-size:1rem;max-width:500px;margin:1rem auto">150+ commands · 3 platforms · AI · Trading · Web3 · Rust · MIT</p>
    <div class="grid4">
      <div class="card" style="text-align:center"><h3>🤖</h3><p>3 Bots</p></div>
      <div class="card" style="text-align:center"><h3>💻</h3><p>150+ Cmd</p></div>
      <div class="card" style="text-align:center"><h3>🌍</h3><p>15 Langues</p></div>
      <div class="card" style="text-align:center"><h3>🦀</h3><p>4000+ Lignes</p></div>
    </div>
    <div style="margin-top:1rem">
      <a href="#chat" class="btn btn-primary" onclick="showSection('chat')">💬 Chat AI</a>
      <a href="#grants" class="btn btn-primary" onclick="showSection('grants')">💰 Live Grants</a>
      <a href="#giants" class="btn btn-primary" onclick="showSection('giants')">🏢 Live Giants</a>
      <a href="#donate" class="btn btn-outline" onclick="showSection('donate')">💖 Donate</a>
    </div>
  </div>`;
}

function initChat(){
  document.getElementById('chat').innerHTML = `<h2>💬 Chat AI (DeepSeek)</h2>
    <div class="card"><div id="chat-messages" style="height:220px;overflow-y:auto;margin-bottom:0.5rem;padding:0.5rem;background:rgba(0,0,0,0.2);border-radius:12px"><div style="background:var(--surface);padding:0.4rem 0.8rem;border-radius:15px;max-width:80%">🤖 Hello! Ask me anything. For real AI, connect DeepSeek API key in settings.</div></div>
    <div style="display:flex;gap:0.5rem"><input type="text" id="chat-input" placeholder="Ask..." style="flex:1;padding:0.5rem;border-radius:20px;border:1px solid #334155;background:var(--surface);color:var(--text)"><button class="btn btn-primary" onclick="sendChat()">Send</button></div></div>`;
}

function sendChat(){
  const input=document.getElementById('chat-input'),msg=input.value.trim();
  if(!msg) return;
  const c=document.getElementById('chat-messages');
  c.innerHTML+=`<div style="background:var(--primary);color:#fff;padding:0.4rem 0.8rem;border-radius:15px;max-width:80%;margin-left:auto;text-align:right">${msg}</div>`;
  input.value='';
  setTimeout(()=>{
    let r='Interesting! For a full AI experience, add your DeepSeek API key. Meanwhile, check /help in Terminal. 🤖';
    if(msg.toLowerCase().includes('grant')) r='💰 Live grants available: NLnet NGI Zero (50k€), Gitcoin GG25, Optimism RetroPGF. Check the Grants section!';
    if(msg.toLowerCase().includes('donate')) r='💖 Support us via BTC, ETH, SOL, USDT. Every donation helps keep our tools free and open source.';
    c.innerHTML+=`<div style="background:var(--surface);padding:0.4rem 0.8rem;border-radius:15px;max-width:80%">🤖 ${r}</div>`;
    c.scrollTop=c.scrollHeight;
  },500);
}

function initTerminal(){
  document.getElementById('terminal').innerHTML = `<h2>💻 Live Terminal</h2>
    <div class="card" id="terminal-box"><div id="terminal-output">$ BAKOME_MEGA-BOT v8.0 — Type /help</div><input type="text" id="terminal-input" placeholder="/help, /crypto BTC, /yield, /status..."></div>`;
  const ti=document.getElementById('terminal-input'),to=document.getElementById('terminal-output');
  ti.addEventListener('keydown',function(e){if(e.key==='Enter'){let cmd=this.value.trim();to.innerHTML+=`\n$ ${cmd}`;let r='';
  if(cmd==='/help')r='Commands: /crypto /gold /forex /yield /status /donate /grants /bridge /zk /help';
  else if(cmd.startsWith('/crypto')){let s=cmd.split(' ')[1]||'BTC';r=`💰 ${s.toUpperCase()} = $${(Math.random()*100000).toFixed(2)} USDT`}
  else if(cmd==='/yield')r='🌾 Top: solana:Jito 45.4% | polygon:Curve 48.6%';
  else if(cmd==='/grants')r='💰 Live: NLnet 50k€ | Gitcoin GG25 | Optimism RetroPGF';
  else if(cmd==='/status')r='✅ v8.0 Online | 3 Platforms | 150+ Cmd';
  else r=`❓ ${cmd}: not found. /help`;
  to.innerHTML+=`\n${r}\n`;this.value='';to.scrollTop=to.scrollHeight}});
}

function initBots(){
  document.getElementById('bots').innerHTML = `<h2>🤖 Our Bots</h2><div class="grid3">${[
    {name:'MEGA-BOT',ver:'v8.0',desc:'Telegram+Discord+Matrix',url:'https://github.com/BAKOME-Hub/BAKOME_MEGA-BOT'},
    {name:'NEXUS',ver:'v2.0',desc:'ZK·FHE·TEE Vault',url:'https://github.com/BAKOME-Hub/BAKOME-NEXUS'},
    {name:'Viber Bot',ver:'v5.0',desc:'90+ commands',url:'https://github.com/BAKOME-Hub/BAKOME-Viber-Bot'},
    {name:'Scholar',ver:'v5.0',desc:'15 sources',url:'https://github.com/BAKOME-Hub/BAKOME-Scholar'}
  ].map(b=>`<div class="card"><span style="color:var(--primary)">${b.ver}</span><h3>${b.name}</h3><p>${b.desc}</p><a href="${b.url}" target="_blank" style="color:var(--accent)">GitHub →</a></div>`).join('')}</div>`;
}

function initResearch(){
  document.getElementById('research').innerHTML = `<h2>🔬 Academic Research</h2>
    <div style="display:flex;gap:0.5rem;margin-bottom:1rem"><input type="text" id="research-input" placeholder="Search..." style="flex:1;padding:0.5rem;border-radius:20px;border:1px solid #334155;background:var(--surface);color:var(--text)"><button class="btn btn-primary" onclick="searchAcademic()">🔍</button></div>
    <div id="research-results" class="grid2"></div>`;
}

async function searchAcademic(){
  const q=document.getElementById('research-input').value;if(!q)return;
  document.getElementById('research-results').innerHTML='<div class="card"><p>🔍 Searching...</p></div>';
  let r='';
  try{let arxiv=await fetch(`https://export.arxiv.org/api/query?search_query=all:${encodeURIComponent(q)}&max_results=2`).then(r=>r.text());let titles=arxiv.match(/<title>(.*?)<\/title>/g)?.slice(1,3).map(t=>t.replace(/<\/?title>/g,''))||[];r+='<div class="card"><h3>📄 arXiv</h3>'+titles.map(t=>`<p>• ${t}</p>`).join('')+'</div>'}catch(e){}
  try{let wiki=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`).then(r=>r.json());if(wiki.extract)r+=`<div class="card"><h3>📚 Wikipedia</h3><p>${wiki.extract.substring(0,200)}...</p></div>`}catch(e){}
  document.getElementById('research-results').innerHTML=r||'<div class="card"><p>No results.</p></div>';
}

function initGlobe(){
  document.getElementById('globe').innerHTML=`<h2>🌍 Users Worldwide</h2><div id="globe-container"></div>`;
  setTimeout(()=>{const c=document.getElementById('globe-container');if(!c)return;const s=new THREE.Scene(),cam=new THREE.PerspectiveCamera(45,c.clientWidth/280,0.1,1000),r=new THREE.WebGLRenderer({alpha:true});r.setSize(c.clientWidth,280);c.appendChild(r.domElement);const g=new THREE.Mesh(new THREE.SphereGeometry(5,32,32),new THREE.MeshBasicMaterial({color:0x1e293b,wireframe:true,transparent:true,opacity:0.3}));s.add(g);for(let i=0;i<40;i++){let d=new THREE.Mesh(new THREE.SphereGeometry(0.04,4,4),new THREE.MeshBasicMaterial({color:0x3b82f6}));d.position.set((Math.random()-0.5)*12,(Math.random()-0.5)*12,(Math.random()-0.5)*12);g.add(d)}cam.position.z=15;(function a(){requestAnimationFrame(a);g.rotation.y+=0.003;r.render(s,cam)})()},300);
}

function initVideo(){
  document.getElementById('video').innerHTML=`<h2>🎥 AI Video Generator</h2><div class="card"><input type="text" id="video-prompt" placeholder="Describe your video..." style="width:100%;padding:0.5rem;border-radius:20px;border:1px solid #334155;background:var(--surface);color:var(--text);margin-bottom:0.5rem"><button class="btn btn-primary" onclick="generateVideo()">🎥 Generate</button><div id="video-result" style="margin-top:1rem"></div></div>`;
}
function generateVideo(){const p=document.getElementById('video-prompt').value||'BAKOME_MEGA_BOT';document.getElementById('video-result').innerHTML=`<video controls style="width:100%;border-radius:12px" src="https://video.pollinations.ai/prompt/${encodeURIComponent(p)}?seed=${Math.floor(Math.random()*1000)}"></video>`;}

function initBlog(){
  document.getElementById('blog').innerHTML=`<h2>📝 AI Blog</h2><div class="grid2">${[{t:'Why Rust is the Future',d:'May 2026',e:'Rust combines performance with safety.'},{t:'Building Multi-Platform Bots',d:'May 2026',e:'How BAKOME_MEGA-BOT unifies 3 platforms.'},{t:'ZK-Proofs Explained',d:'May 2026',e:'How ZK-proofs enable transparency.'}].map(p=>`<div class="card"><h3>${p.t}</h3><p style="font-size:0.7rem;opacity:0.7">${p.d}</p><p>${p.e}</p></div>`).join('')}</div>`;
}

// ============================================================
// LIVE GRANTS (subventions temps réel)
// ============================================================
function initGrants(){
  document.getElementById('grants').innerHTML=`<h2>💰 Live Grants Feed</h2><div class="card live-feed" id="grants-feed"></div>`;
  const grants = [
    {source:'NLnet',title:'NGI Zero Commons Fund',amount:'5k€ - 50k€',deadline:'2026-06-01',url:'https://nlnet.nl/commonsfund'},
    {source:'Gitcoin',title:'GG25 Grants Round',amount:'Variable + matching',deadline:'2026-06-30',url:'https://gitcoin.co/grants'},
    {source:'Optimism',title:'RetroPGF Round 6',amount:'Variable',deadline:'2026-07-15',url:'https://app.optimism.io/retropgf'},
    {source:'Uniswap Foundation',title:'Uniswap Grants',amount:'10k$ - 250k$',deadline:'Rolling',url:'https://www.uniswapfoundation.org/grants'},
    {source:'Polygon',title:'Village Grants',amount:'5k$ - 100k$',deadline:'Rolling',url:'https://polygon.technology/grants'},
    {source:'Solana Foundation',title:'Solana Grants',amount:'Variable',deadline:'Rolling',url:'https://solana.org/grants-funding'},
    {source:'Ethereum Foundation',title:'ESP Grants',amount:'Variable',deadline:'Rolling',url:'https://esp.ethereum.foundation'},
    {source:'Drips Network',title:'Open Source Funding',amount:'Continuous',deadline:'Ongoing',url:'https://drips.network'}
  ];
  const feed = document.getElementById('grants-feed');
  grants.forEach((g,i) => {
    setTimeout(() => {
      feed.innerHTML += `<div class="live-feed-item">🆕 <strong>${g.source}</strong> — ${g.title}<br>💰 ${g.amount} | 📅 ${g.deadline}<br><a href="${g.url}" target="_blank" style="color:var(--accent)">Apply →</a></div>`;
      feed.scrollTop = feed.scrollHeight;
      if(i === grants.length - 1) notify('📢 8 live grants available! Check Grants section.');
    }, i * 800);
  });
}

// ============================================================
// LIVE GIANTS (actualités Web3)
// ============================================================
function initGiants(){
  document.getElementById('giants').innerHTML=`<h2>🏢 Live Giants Feed</h2><div class="card live-feed" id="giants-feed"></div>`;
  const giants = [
    {name:'Solana',action:'New vault infrastructure',desc:'Upshift + FORDEFI + Jito Labs launch Solana vault standard',date:'May 2026'},
    {name:'Circle',action:'USDC expansion',desc:'Native USDC now on 16 blockchains',date:'May 2026'},
    {name:'Chainlink',action:'CCIP upgrade',desc:'Cross-chain interoperability protocol v1.5 live',date:'May 2026'},
    {name:'OpenAI',action:'Codex App',desc:'New desktop app for AI-powered coding launched',date:'May 2026'},
    {name:'GitHub',action:'Copilot update',desc:'AI agent marketplace for developers',date:'May 2026'},
